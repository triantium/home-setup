- hosts: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
    ansible_user: "{{ lookup('env', 'USER') }}"
  gather_facts: false
  tasks:
    - name: Update local password store from remote
      ansible.builtin.command: pass git pull
      register: pass_pull
      changed_when: '"Already up to date" not in pass_pull.stdout'

- hosts:
   - pi
  roles:
    - role: common-setup
    - role: geerlingguy.pip
    - role: geerlingguy.docker
    - role: vector

- hosts: qnap
  roles:
    - role: docker-compose/node-exporter
    - role: docker-compose/postgres
    - role: docker-compose/navidrome
    - role: docker-compose/paperless-ngx
    - role: docker-compose/miniflux
    - role: docker-compose/gitea
    - role: docker-compose/home-assistant
    - role: docker-compose/vector
    - role: docker-compose/restic-exporter
      vars:
        password: "{{ lookup('community.general.passwordstore', 'backup/restic' ) }}"
        path: "{{ lookup('community.general.passwordstore', 'backup/restic' , subkey='local_location') }}"
        type: 'rest'

#- hosts: heimdall
#  roles:
#    - role: docker-compose/pi-hole

- hosts: gloin
  roles:
    - role: docker-compose/monitoring-stack
    - role: docker-compose/meshtastic-web
    - role: docker-compose/homer
    - role: nginx
    - role: docker-compose/fritzbox-exporter
    - role: docker-compose/restic-exporter

- hosts: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
    ansible_user: "{{ lookup('env', 'USER') }}"
  gather_facts: false
  tasks:
    - name: Pull latest password store changes with rebase
      ansible.builtin.command: pass git pull --rebase
      register: pass_pull
      changed_when: '"Already up to date" not in pass_pull.stdout'
    - name: Push local password store changes to remote
      ansible.builtin.command: pass git push
      register: pass_push
      changed_when: '"Everything up-to-date" not in pass_push.stderr'
