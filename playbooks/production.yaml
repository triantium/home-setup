- hosts:
   - pi
  roles:
    - role: common-setup
    - role: geerlingguy.pip
    - role: geerlingguy.docker
    - role: vector

- hosts: qnap
  roles:
    - role: docker-compose/node-exporter
    - role: docker-compose/postgres
    - role: docker-compose/navidrome
    - role: docker-compose/paperless-ngx
    - role: docker-compose/miniflux
    - role: docker-compose/gitea
    - role: docker-compose/home-assistant
    - role: docker-compose/vector
    - role: docker-compose/restic-exporter
      vars:
        password: "{{ lookup('community.general.passwordstore', 'backup/restic' ) }}"
        path: "{{ lookup('community.general.passwordstore', 'backup/restic' , subkey='local_location') }}"
        type: 'rest'

#- hosts: heimdall
#  roles:
#    - role: docker-compose/pi-hole

- hosts: gloin
  roles:
    - role: docker-compose/monitoring-stack
    - role: docker-compose/meshtastic-web
    - role: docker-compose/homer
    - role: nginx
    - role: docker-compose/fritzbox-exporter
    - role: docker-compose/restic-exporter
