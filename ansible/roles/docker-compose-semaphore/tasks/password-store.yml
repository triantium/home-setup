- name: Get password store git remote URL from control node
  delegate_to: localhost
  run_once: true
  ansible.builtin.shell:
    cmd: git -C ~/.password-store remote get-url origin
  register: pass_store_remote_url_result
  changed_when: false

- name: Set password store git remote URL fact
  ansible.builtin.set_fact:
    semaphore_pass_store_repo: "{{ pass_store_remote_url_result.stdout }}"

- name: Clone password store from git remote on target
  block:
    - name: Check if password store is a git repository
      ansible.builtin.stat:
        path: "{{ semaphore_pass_store_path }}/.git"
      register: pass_store_git

    - name: Remove non-git password store directory
      ansible.builtin.file:
        path: "{{ semaphore_pass_store_path }}"
        state: absent
      when: not pass_store_git.stat.exists

    - name: Clone password store repository
      ansible.builtin.git:
        repo: "{{ semaphore_pass_store_repo }}"
        dest: "{{ semaphore_pass_store_path }}"
        accept_hostkey: true
        force: yes
