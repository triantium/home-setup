- name: Setup semaphore GPG key via password store
  delegate_to: localhost
  run_once: true
  block:
    - name: Check if semaphore GPG private key exists in password store
      ansible.builtin.shell:
        cmd: pass show "{{ semaphore_gpg_key_private_password_store_location }}"
      register: pass_gpg_key_check
      failed_when: false
      changed_when: false
      no_log: true

    - name: Generate and store semaphore GPG key pair
      when: pass_gpg_key_check.rc != 0
      block:
        - name: Generate semaphore GPG key pair
          ansible.builtin.command:
            cmd: >
              gpg --batch --passphrase '' --quick-gen-key
              "{{ semaphore_gpg_key_name }} <{{ semaphore_gpg_key_email }}>"
              RSA@4096 default 0

        - name: Store GPG private key in password store
          ansible.builtin.shell:
            cmd: >
              gpg --batch --armor --export-secret-key
              "{{ semaphore_gpg_key_email }}"
              | pass insert --multiline "{{ semaphore_gpg_key_private_password_store_location }}"

        - name: Store GPG public key in password store
          ansible.builtin.shell:
            cmd: >
              gpg --batch --armor --export
              "{{ semaphore_gpg_key_email }}"
              | pass insert --multiline "{{ semaphore_gpg_key_public_password_store_location }}"

    - name: Retrieve GPG private key from password store
      ansible.builtin.shell:
        cmd: pass show "{{ semaphore_gpg_key_private_password_store_location }}" > /tmp/semaphore-private.key
      changed_when: false

    - name: Retrieve GPG public key from password store
      ansible.builtin.shell:
        cmd: pass show "{{ semaphore_gpg_key_public_password_store_location }}" > /tmp/semaphore-public.key
      changed_when: false
      ignore_errors: true

    - name: Import GPG key into local keychain if not present
      ansible.builtin.command:
        cmd: gpg --batch --import /tmp/semaphore-private.key
      register: gpg_import_result
      failed_when: false
      changed_when: gpg_import_result.rc == 0

    - name: Get semaphore GPG key ID
      ansible.builtin.shell:
        cmd: >
          gpg --list-keys --with-colons "{{ semaphore_gpg_key_email }}"
          | awk -F: '/^pub:/ {print $5; exit}'
      register: gpg_key_id_result
      changed_when: false

    - name: Set semaphore GPG key ID fact
      ansible.builtin.set_fact:
        semaphore_gpg_key_id: "{{ gpg_key_id_result.stdout }}"

    - name: Get current password store GPG recipients
      ansible.builtin.shell:
        cmd: cat ~/.password-store/.gpg-id
      register: current_gpg_ids
      changed_when: false

    - name: Add semaphore GPG key to password store recipients
      when: semaphore_gpg_key_id not in current_gpg_ids.stdout_lines
      ansible.builtin.shell:
        cmd: pass init $(cat ~/.password-store/.gpg-id) "{{ semaphore_gpg_key_id }}"

    - name: Push password store git changes
      ansible.builtin.shell:
        cmd: pass git push
      changed_when: false
      failed_when: false

- name: Create semaphore GPG directory on target
  ansible.builtin.file:
    path: "{{ semaphore_gpg_dir }}"
    state: directory
    mode: '0755'

- name: Copy GPG private key to target
  ansible.builtin.copy:
    src: /tmp/semaphore-private.key
    dest: "{{ semaphore_gpg_dir }}/semaphore-private.key"
    mode: '0400'

- name: Copy GPG public key to target
  ansible.builtin.copy:
    src: /tmp/semaphore-public.key
    dest: "{{ semaphore_gpg_dir }}/semaphore-public.key"
    mode: '0444'
