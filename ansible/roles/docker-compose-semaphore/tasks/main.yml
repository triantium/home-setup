- name: Create a directory for the semaphore service
  ansible.builtin.file:
    path: "/opt/{{domain}}/semaphore"
    state: directory

- name: Setup semaphore GPG key in local password store
  delegate_to: localhost
  run_once: true
  block:
    - name: Check if semaphore GPG key exists locally
      ansible.builtin.command:
        cmd: gpg --list-keys "{{ semaphore_gpg_key_email }}"
      register: gpg_key_check
      failed_when: false
      changed_when: false

    - name: Generate semaphore GPG key
      when: gpg_key_check.rc != 0
      ansible.builtin.command:
        cmd: >
          gpg --batch --passphrase '' --quick-gen-key
          "{{ semaphore_gpg_key_name }} <{{ semaphore_gpg_key_email }}>"
          RSA@4096 default 0

    - name: Export semaphore GPG private key
      ansible.builtin.shell:
        cmd: gpg --batch --armor --export-secret-key "{{ semaphore_gpg_key_email }}" > /tmp/semaphore-private.key
      changed_when: false

    - name: Get semaphore GPG key ID
      ansible.builtin.shell:
        cmd: >
          gpg --list-keys --with-colons "{{ semaphore_gpg_key_email }}"
          | awk -F: '/^pub:/ {print $5; exit}'
      register: gpg_key_id_result
      changed_when: false

    - name: Set semaphore GPG key ID fact
      ansible.builtin.set_fact:
        semaphore_gpg_key_id: "{{ gpg_key_id_result.stdout }}"

    - name: Get current password store GPG recipients
      ansible.builtin.shell:
        cmd: cat ~/.password-store/.gpg-id
      register: current_gpg_ids
      changed_when: false

    - name: Add semaphore GPG key to password store
      when: semaphore_gpg_key_id not in current_gpg_ids.stdout_lines
      ansible.builtin.shell:
        cmd: pass init $(cat ~/.password-store/.gpg-id) "{{ semaphore_gpg_key_id }}"

    - name: Push password store git changes
      ansible.builtin.shell:
        cmd: pass git push
      changed_when: false
      failed_when: false

- name: Create semaphore GPG and password store directories on target
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ semaphore_gpg_dir }}"
    - "{{ semaphore_pass_store_path }}"

- name: Copy GPG private key to target
  ansible.builtin.copy:
    src: /tmp/semaphore-private.key
    dest: "{{ semaphore_gpg_dir }}/semaphore-private.key"
    mode: '0400'

- name: Archive password store locally
  delegate_to: localhost
  run_once: true
  ansible.builtin.archive:
    path: "{{ lookup('env', 'HOME') }}/.password-store/"
    dest: /tmp/passwordstore.tar.gz
    format: gz

- name: Copy password store archive to target
  ansible.builtin.copy:
    src: /tmp/passwordstore.tar.gz
    dest: /tmp/passwordstore.tar.gz

- name: Extract password store on target
  ansible.builtin.unarchive:
    src: /tmp/passwordstore.tar.gz
    dest: "/opt/{{domain}}/semaphore/"
    remote_src: yes

- name: Copy Dockerfile to target
  ansible.builtin.copy:
    src: Dockerfile
    dest: "/opt/{{domain}}/semaphore/Dockerfile"

- name: Copy entrypoint script to target
  ansible.builtin.copy:
    src: semaphore-init.sh
    dest: "/opt/{{domain}}/semaphore/semaphore-init.sh"
    mode: '0755'

- name: Templating Environment
  ansible.builtin.template:
    src: env.j2
    dest: "/opt/{{domain}}/semaphore/.env"

- name: Detect Docker CLI path
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /usr/bin/docker
    - /usr/local/bin/docker
    - /share/CACHEDEV1_DATA/.qpkg/container-station/bin/docker
  register: docker_cli_candidates

- name: Set Docker CLI path
  ansible.builtin.set_fact:
    docker_cli: >-
      {{
        (docker_cli_candidates.results
          | selectattr('stat.exists', 'equalto', true)
          | map(attribute='stat.path')
          | list
          | first)
        | default('')
      }}

- name: Fail if Docker CLI was not found
  ansible.builtin.fail:
    msg: "Docker CLI not found on the target host. Expected it in /usr/bin/docker or /usr/local/bin/docker."
  when: docker_cli | length == 0

- name: Build custom semaphore Docker image
  ansible.builtin.command:
    cmd: "{{ docker_cli }} build -t semaphore-custom:latest -f Dockerfile ."
    chdir: "/opt/{{domain}}/semaphore"

- name: Create external Docker network
  ansible.builtin.command:
    cmd: "{{ docker_cli }} network create postgres-net"
  register: network_create
  changed_when: network_create.rc == 0
  failed_when: network_create.rc != 0 and 'already exists' not in network_create.stderr

- name: Ensure semaphore database and user exist
  ansible.builtin.shell:
    cmd: >
      {{ docker_cli }} run --rm --network postgres-net
      -e PGPASSWORD={{ postgres_password }}
      postgres:18 psql -h postgres -U postgres
      -c "CREATE USER semaphore WITH PASSWORD '{{ semaphore_db_password }}';"
      -c "CREATE DATABASE semaphore WITH OWNER semaphore;"
      -c "GRANT ALL PRIVILEGES ON DATABASE semaphore TO semaphore;"
  register: db_init
  failed_when: false
  changed_when: db_init.rc == 0

- name: Template docker-compose.yml to target host
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "/opt/{{domain}}/semaphore/docker-compose.yml"
  register: docker_compose_yaml

- name: Start the semaphore service with Docker Compose
  ansible.builtin.command:
    cmd: "{{ docker_cli }} compose up -d"
    chdir: "/opt/{{domain}}/semaphore"

- name: Pull on change
  when: docker_compose_yaml.changed
  command:
    chdir: "/opt/{{domain}}/semaphore"
    cmd: "{{ docker_cli }} compose pull"

- name: Restart on change
  when: docker_compose_yaml.changed
  command:
    chdir: "/opt/{{domain}}/semaphore"
    cmd: "{{ docker_cli }} compose restart"
