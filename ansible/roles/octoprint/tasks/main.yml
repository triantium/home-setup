- name: Create a directory for the octopi service
  ansible.builtin.file:
    path: /opt/octopi
    state: directory

- name: Copy Files which are defining the service
  ansible.builtin.file:
    path: "/opt/octopi/{{item}}"
    state: directory
  loop:
    - octoprint
    - spoolman
    - autorestic
    - autorestic/cron

- name: Templating Environment
  ansible.builtin.template:
    src: env.j2
    dest: /opt/octopi/.env

- name: Template Autorestic Crontab
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/autorestic/crontab.j2"
    dest: /opt/octopi/autorestic/cron/crontab

- name: Copy Autorestic start_cron.sh
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/autorestic/start_cron.sh"
    dest: /opt/octopi/autorestic/cron/start_cron.sh

- name: Template Autorestic Config
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/autorestic/config.yml.j2"
    dest: /opt/octopi/autorestic/config.yml


- name: Copy docker-compose.yml to target host
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /opt/octopi/docker-compose.yml
  register: docker_compose_yaml

#- name: Start the octopi service with Docker Compose
#  ansible.builtin.command:
#    cmd: docker compose up -d
#    chdir: /opt/octopi

- name: Pull on change
  when: docker_compose_yaml.changed
  command:
    chdir: /opt/octopi
    cmd: docker compose pull

