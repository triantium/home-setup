- name: Create a directory for the databases
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
  loop:
    - "/opt/{{domain}}"
    - "/opt/{{domain}}/paperless"
    - "/opt/{{domain}}/paperless/autorestic"
    - "/opt/{{domain}}/paperless/autorestic/cron"

- name: Copy static files to target host
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
  loop:
    - { src: "docker-compose.yml", dest: "/opt/{{domain}}/paperless/docker-compose.yml" }
    - { src: "cron", dest: "/opt/{{domain}}/paperless/autorestic" }
  register: static_files_copy_result

- name: Copy Templates to target host
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
  loop:
    - { src: "env.j2", dest: "/opt/{{domain}}/paperless/.env" }
    - { src: "config.yml.j2", dest: "/opt/{{domain}}/paperless/autorestic/config.yml" }
  register: templates_copy_result


- name: Detect Docker CLI path
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /usr/bin/docker
    - /usr/local/bin/docker
    - /share/CACHEDEV1_DATA/.qpkg/container-station/bin/docker
  register: docker_cli_candidates

- name: Set Docker CLI path
  ansible.builtin.set_fact:
    docker_cli: >-
      {{
        (docker_cli_candidates.results
          | selectattr('stat.exists', 'equalto', true)
          | map(attribute='stat.path')
          | list
          | first)
        | default('')
      }}

- name: Fail if Docker CLI was not found
  ansible.builtin.fail:
    msg: "Docker CLI not found on the target host. Expected it in /usr/bin/docker or /usr/local/bin/docker."
  when: docker_cli | length == 0

- name: Pull the Images
  ansible.builtin.command:
    cmd: "{{ docker_cli }} compose pull"
    chdir: '/opt/{{domain}}/paperless'
  when: static_files_copy_result.changed

- name: Start the paperless service with Docker Compose
  ansible.builtin.command:
    cmd: "{{ docker_cli }} compose up -d"
    chdir: '/opt/{{domain}}/paperless'

- name: Restart on change
  when: static_files_copy_result.changed or templates_copy_result.changed
  command:
    chdir: '/opt/{{domain}}/paperless'
    cmd: "{{ docker_cli }} compose restart"
