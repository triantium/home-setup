services:
  navidrome:
    image: deluan/navidrome:0.61.1
    user: 1001:1000 # should be owner of volumes
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      ND_CONFIGFILE: "/data/navidrome.toml"
      ND_MUSICFOLDER: "/music/Metal"
    volumes:
      - "${DATA_DIR}:/data"
      - "${MUSIC_DIR}:/music:ro"
