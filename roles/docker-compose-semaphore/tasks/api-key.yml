- name: Wait for semaphore to be ready
  ansible.builtin.uri:
    url: "{{ semaphore_api_url }}/ping"
    return_content: yes
  register: ping_result
  retries: 30
  delay: 2
  until: ping_result.status == 200

- name: Read SSH private key from target
  ansible.builtin.slurp:
    src: "{{ semaphore_ssh_private_key_path }}"
  register: ssh_private_key_slurp

- name: Write login payload to temp file
  ansible.builtin.copy:
    content: |
      {"auth": "{{ semaphore_admin_user }}", "password": "{{ semaphore_admin_password }}"}
    dest: /tmp/semaphore-login.json
    mode: '0600'
  no_log: true

- name: Login to Semaphore and save cookie
  ansible.builtin.shell:
    cmd: >
      curl -s -c /tmp/semaphore-cookie.txt
      -X POST "{{ semaphore_api_url }}/auth/login"
      -H "Content-Type: application/json"
      -d @/tmp/semaphore-login.json
      -w "%{http_code}" -o /dev/null
  no_log: true
  changed_when: false

- name: Create API token
  ansible.builtin.shell:
    cmd: >
      curl -s -b /tmp/semaphore-cookie.txt
      -X POST "{{ semaphore_api_url }}/user/tokens"
      -H "Content-Type: application/json"
  register: token_response
  changed_when: false

- name: Clean up temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/semaphore-login.json
    - /tmp/semaphore-cookie.txt
  changed_when: false

- name: Set Semaphore API token fact
  ansible.builtin.set_fact:
    semaphore_api_token: "{{ (token_response.stdout | from_json).id }}"

- name: Get existing projects
  ansible.builtin.uri:
    url: "{{ semaphore_api_url }}/projects"
    method: GET
    headers:
      Authorization: "Bearer {{ semaphore_api_token }}"
  register: projects_result

- name: Find existing project by name
  ansible.builtin.set_fact:
    semaphore_project_id: "{{
      (projects_result.json | default([])
        | selectattr('name', 'equalto', semaphore_project_name)
        | map(attribute='id')
        | first)
      | default('', true)
    }}"

- name: Create project
  when: semaphore_project_id | length == 0
  ansible.builtin.uri:
    url: "{{ semaphore_api_url }}/projects"
    method: POST
    status_code: 201
    headers:
      Authorization: "Bearer {{ semaphore_api_token }}"
      Content-Type: application/json
    body_format: json
    body:
      name: "{{ semaphore_project_name }}"
  register: project_create_result

- name: Set project ID from creation
  ansible.builtin.set_fact:
    semaphore_project_id: "{{ project_create_result.json.id | string }}"
  when: semaphore_project_id | length == 0

- name: Get existing keys
  ansible.builtin.uri:
    url: "{{ semaphore_api_url }}/project/{{ semaphore_project_id }}/keys?sort=name&order=asc"
    method: GET
    headers:
      Authorization: "Bearer {{ semaphore_api_token }}"
  register: existing_keys

- name: Check if SSH key already exists
  ansible.builtin.set_fact:
    semaphore_ssh_key_exists: "{{
      (existing_keys.json
        | selectattr('name', 'equalto', semaphore_ssh_key_name)
        | list
        | length) > 0
    }}"

- name: Write SSH key payload to temp file
  when: not semaphore_ssh_key_exists
  ansible.builtin.copy:
    content: |
      {
        "name": "{{ semaphore_ssh_key_name }}",
        "type": "ssh",
        "project_id": {{ semaphore_project_id }},
        "ssh": {
          "private_key": {{ ssh_private_key_slurp.content | b64decode | to_json }}
        }
      }
    dest: /tmp/semaphore-key-payload.json
    mode: '0600'

- name: Add SSH key to Semaphore project
  when: not semaphore_ssh_key_exists
  ansible.builtin.shell:
    cmd: >
      curl -s -o /tmp/semaphore-key-result.json -w "%{http_code}"
      -X POST "{{ semaphore_api_url }}/project/{{ semaphore_project_id }}/keys"
      -H "Authorization: Bearer {{ semaphore_api_token }}"
      -H "Content-Type: application/json"
      -d @/tmp/semaphore-key-payload.json
  register: key_create_result
  changed_when: key_create_result.stdout == "201" or key_create_result.stdout == "204"

- name: Read created key ID
  when: not semaphore_ssh_key_exists
  ansible.builtin.slurp:
    src: /tmp/semaphore-key-result.json
  register: key_result_slurp
  changed_when: false

- name: Set SSH key ID fact
  when: not semaphore_ssh_key_exists
  ansible.builtin.set_fact:
    semaphore_ssh_key_id: "{{ (key_result_slurp.content | b64decode | from_json).id | string }}"

- name: Clean up key payload file
  when: not semaphore_ssh_key_exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/semaphore-key-payload.json
    - /tmp/semaphore-key-result.json

- name: Get SSH key ID from existing keys (when key was not just created)
  when: semaphore_ssh_key_exists
  ansible.builtin.set_fact:
    semaphore_ssh_key_id: "{{
      (existing_keys.json
        | selectattr('name', 'equalto', semaphore_ssh_key_name)
        | map(attribute='id')
        | first)
      | string
    }}"

- name: Get existing repositories
  ansible.builtin.uri:
    url: "{{ semaphore_api_url }}/project/{{ semaphore_project_id }}/repositories?sort=name&order=asc"
    method: GET
    headers:
      Authorization: "Bearer {{ semaphore_api_token }}"
  register: existing_repos

- name: Check if repository already exists
  ansible.builtin.set_fact:
    semaphore_repo_exists: "{{
      (existing_repos.json
        | selectattr('git_url', 'equalto', semaphore_repo_url)
        | list
        | length) > 0
    }}"

- name: Write repository payload to temp file
  when: not semaphore_repo_exists
  ansible.builtin.copy:
    content: |
      {
        "name": {{ semaphore_repo_name | to_json }},
        "project_id": {{ semaphore_project_id }},
        "git_url": {{ semaphore_repo_url | to_json }},
        "git_branch": {{ semaphore_repo_branch | to_json }},
        "ssh_key_id": {{ semaphore_ssh_key_id }}
      }
    dest: /tmp/semaphore-repo-payload.json
    mode: '0600'

- name: Add git repository to project
  when: not semaphore_repo_exists
  ansible.builtin.shell:
    cmd: >
      curl -s -o /dev/null -w "%{http_code}"
      -X POST "{{ semaphore_api_url }}/project/{{ semaphore_project_id }}/repositories"
      -H "Authorization: Bearer {{ semaphore_api_token }}"
      -H "Content-Type: application/json"
      -d @/tmp/semaphore-repo-payload.json
  register: repo_create_result
  changed_when: repo_create_result.stdout == "201" or repo_create_result.stdout == "204"

- name: Clean up repo payload file
  when: not semaphore_repo_exists
  ansible.builtin.file:
    path: /tmp/semaphore-repo-payload.json
    state: absent
