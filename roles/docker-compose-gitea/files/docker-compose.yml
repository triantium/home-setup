version: "3"

networks:
  gitea:
    external: false

services:
  server:
    image: gitea/gitea:1.26.2
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__SSH_PORT=222
      - GITEA__server__LISTEN_PORT=22
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres-internal:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=gitea
      - GITEA__mailer__ENABLED=true
      - GITEA__mailer__FROM=${GITEA__mailer__FROM}
      - GITEA__mailer__SMTP_PORT=${GITEA__mailer__SMTP_PORT:-587}
      - GITEA__mailer__PROTOCOL=${GITEA__mailer__PROTOCOL:-smtp+starttls}
      - GITEA__mailer__SMTP_ADDR=${GITEA__mailer__SMTP_ADDR}
      - GITEA__mailer__USER=${GITEA__mailer__USER}
      - GITEA__mailer__PASSWD=${GITEA__mailer__PASSWD}
    restart: always
    networks:
      - gitea
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "222:22"
    depends_on:
      - postgres-internal
  postgres-internal:
    image: postgres:17.10
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gitea -d gitea" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
        - POSTGRES_USER=gitea
        - POSTGRES_PASSWORD=gitea
        - POSTGRES_DB=gitea
    networks:
        - gitea
    volumes:
        - gitea-db:/var/lib/postgresql/data

  pgbackups:
    image: prodrigestivill/postgres-backup-local:17-alpine
    restart: always
    volumes:
      - gitea_pgbackups:/backups
    depends_on:
      postgres-internal:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres-internal
      - POSTGRES_CLUSTER=true
      - POSTGRES_DB=gitea
      - POSTGRES_USER=gitea
      - POSTGRES_PASSWORD=gitea
      - POSTGRES_EXTRA_OPTS=-Z1 --schema=public --blobs
      - BACKUP_ON_START=TRUE
      - SCHEDULE=@daily
      - TZ=Europe/Berlin
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080

  autorestic:
    image: pascaliske/autorestic:latest
    restart: always
    environment:
      - RESTIC_HOST=gitea
    volumes:
      - ./autorestic/config.yml:/etc/autorestic/config.yml
      - ./autorestic/cron:/etc/cron/
      - gitea-db:/backups/gitea-db
      - gitea_pgbackups:/backups/gitea_pgbackups
      - gitea-data:/backups/gitea_data
    entrypoint: [ "/bin/sh", "/etc/cron/start_cron.sh" ]

volumes:
  gitea-data:
  gitea-db:
  gitea_pgbackups:
  # TODO Backup
