version: '3'

volumes:
  keycloak-data:
  keycloak-db:
  keycloak_pgbackups:

services:
  postgres-internal:
    image: 'postgres:17.10'
    volumes:
      - keycloak-db:/var/lib/postgresql/data
    restart: 'always'
    # ports:
    #   - 5432:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U keycloak -d keycloak" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
      POSTGRES_HOST: postgres-internal

  pgbackups:
    image: prodrigestivill/postgres-backup-local:17-alpine
    restart: always
    volumes:
      - keycloak_pgbackups:/backups
    depends_on:
      postgres-internal:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres-internal
      - POSTGRES_CLUSTER=true
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak
      - POSTGRES_EXTRA_OPTS=-Z1 --schema=public --blobs
      - BACKUP_ON_START=TRUE
      - SCHEDULE=@daily
      - TZ=Europe/Berlin
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080

  autorestic:
    image: pascaliske/autorestic:latest
    restart: always
    environment:
      - RESTIC_HOST=keycloak
    volumes:
      - ./autorestic/config.yml:/etc/autorestic/config.yml
      - ./autorestic/cron:/etc/cron/
      - keycloak-db:/backups/keycloak-db
      - keycloak_pgbackups:/backups/keycloak_pgbackups
      - keycloak-data:/backups/keycloak_data
    entrypoint: [ "/bin/sh", "/etc/cron/start_cron.sh" ]

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.2
    ports:
       - 8080:8080
       - 8443:8443
       - 9000:9000
    environment:
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
      KC_DB: postgres
      KC_DB_URL_HOST: postgres-internal
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: localhost
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      #KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/server.keystore
    entrypoint:
     - '/opt/keycloak/bin/kc.sh'
     - 'start'
     - '--https-certificate-file=/opt/keycloak/certs/cert.pem'
     - '--https-certificate-key-file=/opt/keycloak/certs/key.pem'
    volumes:
      - ./certs:/opt/keycloak/certs/
    depends_on:
      - postgres-internal
