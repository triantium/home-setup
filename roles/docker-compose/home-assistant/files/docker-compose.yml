services:
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:2026.7.2"
    volumes:
      - config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro # Bluetooth-support
    restart: unless-stopped
    privileged: true
    network_mode: host
    healthcheck:
      test: [ "CMD-SHELL", "wget -q http://localhost:8123 -O /dev/null" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
  autorestic:
    image: pascaliske/autorestic:latest
    restart: always
    environment:
      - RESTIC_HOST=home-assistant
    volumes:
      - ./autorestic/config.yml:/etc/autorestic/config.yml
      - ./autorestic/cron:/etc/cron/
      - config:/backups/homeassistant_config
    entrypoint: [ "/bin/sh", "/etc/cron/start_cron.sh" ]

volumes:
  config:
