version: '3'

volumes:
  keycloak-data:

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    ports:
       - 8080:8080
       - 8443:8443
       - 9000:9000
    environment:
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: localhost
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    entrypoint:
     - '/opt/keycloak/bin/kc.sh'
     - 'start'
     - '--https-certificate-file=/opt/keycloak/certs/cert.pem'
     - '--https-certificate-key-file=/opt/keycloak/certs/key.pem'
    volumes:
      - ./certs:/opt/keycloak/certs/
      - keycloak-data:/opt/keycloak/data
    networks:
      postgres-net:
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready -o /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  postgres-net:
    external: true
