- name: Create workdirs
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
  loop:
    - path: /opt/monitoring-stack
    - path: /opt/monitoring-stack/etc
    - path: /opt/monitoring-stack/var/lib/grafana
      owner: 472
      group: 472

- name: Copy static stack files
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
  loop:
    - src: docker-compose.yaml
      dest: /opt/monitoring-stack/
    - src: etc/
      dest: /opt/monitoring-stack/etc/
    - src: dashboards/
      dest: /opt/monitoring-stack/dashboards/
  register: stack_files

- name: Template config files with secrets
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
  loop:
    - src: etc/prometheus/prometheus.yml.j2
      dest: /opt/monitoring-stack/etc/prometheus/prometheus.yml
    - src: etc/prometheus/alertmanager.yml.j2
      dest: /opt/monitoring-stack/etc/prometheus/alertmanager.yml
    - src: etc/blackbox/blackbox.yml.j2
      dest: /opt/monitoring-stack/etc/blackbox/blackbox.yml
  register: templated_files

- name: Create and Start Stack
  command:
    chdir: /opt/monitoring-stack
    cmd: "{{ docker_cli }} compose up -d"

- name: Pull on change
  when: stack_files.changed or templated_files.changed
  command:
    chdir: /opt/monitoring-stack
    cmd: "{{ docker_cli }} compose pull"

- name: Restart on change
  when: stack_files.changed or templated_files.changed
  command:
    chdir: /opt/monitoring-stack
    cmd: "{{ docker_cli }} compose restart"

- name: Wait for all services to become healthy
  shell:
    cmd: |
      set -e
      for c in $({{ docker_cli }} compose ps -q); do
        name=$({{ docker_cli }} inspect --format='{% raw %}{{.Name}}{% endraw %}' "$c")
        health=$({{ docker_cli }} inspect --format='{% raw %}{{with .State.Health}}{{.Status}}{{else}}none{{end}}{% endraw %}' "$c" 2>/dev/null || echo "none")
        case "$health" in
          healthy|none) echo "$name: $health" ;;
          starting) echo "$name: $health (retrying)"; exit 1 ;;
          *) echo "$name: $health"; exit 1 ;;
        esac
      done
      echo "All services are up"
    chdir: /opt/monitoring-stack
  register: health_result
  retries: 12
  delay: 10
  until: health_result is not failed
