services:
  loki:
    image: grafana/loki:3.7.2
    volumes:
      - ./etc/loki:/etc/loki
      - ./data/loki:/data
    command:
      - '--config.file=/etc/loki/local-config.yaml'
    ports:
      - 3100:3100
    restart: always

  prometheus:
    image:        prom/prometheus
    #pull_policy: always
    volumes:
      - ./etc/prometheus:/etc/prometheus
      - ./data/prometheus:/data
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/data'
    ports:
      - 9999:9090
    restart:      always
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:9090/-/healthy -O /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
#    networks:
#      - promnet

  alertmanager:
    image:        prom/alertmanager
    #pull_policy: always
    depends_on:
      - prometheus
    volumes:
      - ./etc/prometheus:/etc/prometheus
      - ./data/alertmanager:/data
    command:
      - '--config.file=/etc/prometheus/alertmanager.yml'
      - '--storage.path=/data'
    restart:      always
    ports:
      - 9093:9093
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:9093/-/healthy -O /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
  grafana:
    ports:
      - "3333:3000"
    depends_on:
      - prometheus
    volumes:
        - "./etc/grafana:/etc/grafana"
        - "./var/lib/grafana:/var/lib/grafana"
        - "./dashboards:/var/lib/grafana/dashboards"
        - "./var/log/grafana:/var/log/grafana"
    restart:      always
    image:        grafana/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:3000/api/health -O /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  blackbox:
    image:        prom/blackbox-exporter:master
    #pull_policy: always
    volumes:
      - ./etc/blackbox:/etc/blackbox
    command:
      - '--config.file=/etc/blackbox/blackbox.yml'
    ports:
      - 9115:9115
    restart:      always
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:9115/-/healthy -O /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
  json-exporter:
    image: quay.io/prometheuscommunity/json-exporter
    volumes:
      - ./etc/json_exporter/config.yml:/config.yml
    command:
      - '--config.file=/config.yml'
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:7979/metrics -O /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  pushgateway:
    image: prom/pushgateway
    restart: always
    ports:
      - 9091:9091
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:9091/-/healthy -O /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
