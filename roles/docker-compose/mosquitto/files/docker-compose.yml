version: "3.3"
services:
  mosquitto:
    image:  eclipse-mosquitto:2.0.22
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - mosquitto-config:/mosquitto/config/
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "pgrep mosquitto || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
  exporter:
    image: sapcc/mosquitto-exporter:0.8.0
    ports:
      - '9234:9234'
    environment:
      - BROKER_ENDPOINT=tcp://mosquitto:1883
      - MQTT_USER=${MQTT_EXPORTER_USER:-exporter}
      - MQTT_PASS=${MQTT_EXPORTER_PASS}
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:9234/metrics -O /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
volumes:
  mosquitto-data:
  mosquitto-log:
  mosquitto-config:
