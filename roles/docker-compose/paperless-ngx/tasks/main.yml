- name: Create a directory for the databases
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
  loop:
    - "/opt/{{domain}}"
    - "/opt/{{domain}}/paperless"
    - "/opt/{{domain}}/paperless/autorestic"
    - "/opt/{{domain}}/paperless/autorestic/cron"

- name: Copy static files to target host
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
  loop:
    - { src: "docker-compose.yml", dest: "/opt/{{domain}}/paperless/docker-compose.yml" }
  register: static_files_copy_result

- name: Template Env
  ansible.builtin.template:
    src: env.j2
    dest: "/opt/{{domain}}/paperless/.env"
  register: env_template

- name: Template Autorestic Config
  ansible.builtin.template:
    src: "{{ shared_templates_dir }}/autorestic/config.yml.j2"
    dest: "/opt/{{domain}}/paperless/autorestic/config.yml"
  register: autorestic_template

- name: Template Autorestic Crontab
  ansible.builtin.template:
    src: "{{ shared_templates_dir }}/autorestic/crontab.j2"
    dest: "/opt/{{domain}}/paperless/autorestic/cron/crontab"
  register: autorestic_crontab_template

- name: Copy Autorestic start_cron.sh
  ansible.builtin.template:
    src: "{{ shared_templates_dir }}/autorestic/start_cron.sh"
    dest: "/opt/{{domain}}/paperless/autorestic/cron/start_cron.sh"
  register: autorestic_start_cron_template


- name: Pull the Images
  ansible.builtin.command:
    cmd: "{{ docker_cli }} compose pull"
    chdir: '/opt/{{domain}}/paperless'
  when: static_files_copy_result.changed

- name: Start the paperless service with Docker Compose
  ansible.builtin.command:
    cmd: "{{ docker_cli }} compose up -d"
    chdir: '/opt/{{domain}}/paperless'

- name: Restart on change
  when: static_files_copy_result.changed or env_template.changed or autorestic_template.changed or autorestic_crontab_template.changed or autorestic_start_cron_template.changed
  command:
    chdir: '/opt/{{domain}}/paperless'
    cmd: "{{ docker_cli }} compose restart"
