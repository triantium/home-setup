- name: Create homer directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
  loop:
    - path: /opt/homer
    - path: /opt/homer/etc/homer
      owner: '472'
      group: '472'

- name:  Write homer config via Template
  ansible.builtin.template:
    src: "{{item.src}}"
    dest: "/opt/homer/etc/homer/{{item.path}}"
  with_filetree: templates/etc/homer/
  when: item.state == 'file'
  register: config_template

- name:             Copy docker-compose configuration
  copy:
    src:            docker-compose.yaml
    dest:           /opt/homer/

  register: docker_compose_yaml

- ansible.builtin.import_tasks: dashboard-icons.yml


- name: Create and Start Stack
  command:
    chdir: /opt/homer
    cmd: "{{ docker_cli }} compose up -d"

- name: Pull on change
  when: docker_compose_yaml.changed
  command:
    chdir: /opt/homer
    cmd: "{{ docker_cli }} compose pull"

- name: Restart on change
  when: docker_compose_yaml.changed
  command:
    chdir: /opt/homer
    cmd: "{{ docker_cli }} compose restart"
