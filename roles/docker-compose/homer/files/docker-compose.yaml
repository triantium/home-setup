services:
  homer:
    image: b4bz/homer:v26.4.2
    #pull_policy: always
    volumes:
      - ./etc/homer:/www/assets
    environment:
      - INIT_ASSETS=1
      - SUBFOLDER=/homer
    ports:
      - 8080:8080
    restart:      always
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:8080 -O /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
  cors-container:
    restart: always
    ports:
      - 8081:3000
    container_name: cors-container
    image: triantium/cors-container:arm64
