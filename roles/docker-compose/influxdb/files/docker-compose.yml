version:              '3'
services:
  influxdb:
    image:            influxdb:2.9.1
    ports:
      - '8086:8086'
    volumes:
      - influxdb-storage:/var/lib/influxdb
    environment:
      - INFLUXDB_DB=openhab
      - INFLUXDB_ADMIN_USER=openhab
      - INFLUXDB_ADMIN_PASSWORD=openhab1
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:8086/health -O /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
  chronograf:
    image:            chronograf:1.11.4
    ports:
      - '8888:8888'
    volumes:
      - chronograf-storage:/var/lib/chronograf
    depends_on:
      - influxdb
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_USERNAME=openhab
      - INFLUXDB_PASSWORD=openhab1
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:8888/health -O /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
volumes:
  influxdb-storage:
  chronograf-storage:
