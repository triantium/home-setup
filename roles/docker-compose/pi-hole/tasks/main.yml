-
#  https://docs.pi-hole.net/api/auth/
- name: Get Session Token
  uri:
    url: "http://{{ansible_facts.hostname}}/api/auth"
    method: POST
    body_format: json
    body:
      password: "{{ lookup('community.general.passwordstore', 'hosts/' + ansible_facts.hostname +'/pihole') }}"
  register: pihole_session
- name: Debug Session Token
  ansible.builtin.debug:
    msg: "{{ pihole_session }}"

- name: Check Blocking
  uri:
    url: "http://{{ansible_facts.hostname}}/api/dns/blocking"
    method: GET
    headers:
      X-FTL-SID: "{{ pihole_session.json.session.sid }}"
