- name: Create a directory for the pihole service
  ansible.builtin.file:
    path: /opt/pihole
    state: directory

- name: Copy Files which are defining the service
  ansible.builtin.file:
    path: "/opt/pihole/{{item}}"
    state: directory
  loop:
    - pihole
    - pihole/etc
    - autorestic
    - autorestic/cron

- name: Templating Environment
  ansible.builtin.template:
    src: env.j2
    dest: /opt/pihole/.env

- name: Copy dnsmasq
  ansible.builtin.copy:
    src: etc/dnsmasq.d/01-pihole.conf
    dest: /opt/pihole/pihole/etc

- name: Template Autorestic Crontab
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../templates/autorestic/crontab.j2"
    dest: /opt/pihole/autorestic/cron/crontab

- name: Copy Autorestic start_cron.sh
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../templates/autorestic/start_cron.sh"
    dest: /opt/pihole/autorestic/cron/start_cron.sh

- name: Template Autorestic Config
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../templates/autorestic/config.yml.j2"
    dest: /opt/pihole/autorestic/config.yml


- name: Copy docker-compose.yml to target host
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /opt/pihole/docker-compose.yml
  register: docker_compose_yaml

- name: Start the pihole service with Docker Compose
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: /opt/pihole

- name: Pull on change
  when: docker_compose_yaml.changed
  command:
    chdir: /opt/pihole
    cmd: docker compose pull

- name: Restart on change
  when: docker_compose_yaml.changed
  command:
    chdir: /opt/pihole
    cmd: docker compose restart
- name: Wait for DNS-Port
  ansible.builtin.wait_for:
    port: 53
    sleep: 5
- name: Wait for http-Port
  ansible.builtin.wait_for:
    port: 80
    sleep: 5
- name: Wait for https-Port
  ansible.builtin.wait_for:
    port: 443
    sleep: 5
- name: Wait for exporter-Port
  ansible.builtin.wait_for:
    port: 9617
    sleep: 5
