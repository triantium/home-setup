      # Device metrics
      - name: device_reboot_counter
        path: '{.data.device.reboot_counter}'
        help: Device reboot counter

      # Memory metrics
      - name: memory_fs_free
        path: '{.data.memory.fs_free}'
        help: Filesystem free space

      - name: memory_fs_total
        path: '{.data.memory.fs_total}'
        help: Filesystem total space

      - name: memory_fs_used
        path: '{.data.memory.fs_used}'
        help: Filesystem used space

      - name: memory_heap_free
        path: '{.data.memory.heap_free}'
        help: Heap free memory

      - name: memory_heap_total
        path: '{.data.memory.heap_total}'
        help: Heap total memory

      - name: memory_psram_free
        path: '{.data.memory.psram_free}'
        help: PSRAM free memory

      - name: memory_psram_total
        path: '{.data.memory.psram_total}'
        help: PSRAM total memory

      # Power metrics
      - name: power_battery_percent
        path: '{.data.power.battery_percent}'
        help: Battery percentage

      - name: power_battery_voltage_mv
        path: '{.data.power.battery_voltage_mv}'
        help: Battery voltage in millivolts

      - name: power_has_battery
        path: '{.data.power.has_battery}'
        help: Whether device has a battery

      - name: power_has_usb
        path: '{.data.power.has_usb}'
        help: Whether device has USB connected

      - name: power_is_charging
        path: '{.data.power.is_charging}'
        help: Whether device is charging

      # Radio metrics
      - name: radio_frequency
        path: '{.data.radio.frequency}'
        help: Radio frequency

      - name: radio_lora_channel
        path: '{.data.radio.lora_channel}'
        help: LoRa channel

      # WiFi metrics
      - name: wifi_rssi
        path: '{.data.wifi.rssi}'
        help: WiFi RSSI value
