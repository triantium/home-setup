services:
  web:
    image: ghcr.io/meshtastic/web
    container_name: Meshtastic-Web
    restart: always
    ports:
      - 8082:8080
      - 8444:8443
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:8080 -O /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
