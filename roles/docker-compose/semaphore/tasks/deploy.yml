- name: Templating Environment
  ansible.builtin.template:
    src: env.j2
    dest: "/opt/{{domain}}/semaphore/.env"
  register: semaphore_env

- name: Template docker-compose.yml to target host
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "/opt/{{domain}}/semaphore/docker-compose.yml"
  register: docker_compose_yaml

- name: Start the semaphore service with Docker Compose (build if missing)
  ansible.builtin.command:
    cmd: "{{ docker_cli }} compose up -d --build"
    chdir: "/opt/{{domain}}/semaphore"

- name: Schedule semaphore restart after the run
  ansible.builtin.shell:
    cmd: "{{ docker_cli }} compose restart semaphore"
    chdir: "/opt/{{domain}}/semaphore"
  when: semaphore_env.changed or docker_compose_yaml.changed or semaphore_dockerfile.changed or semaphore_init_script.changed
  async: 1
  poll: 0
  changed_when: true
