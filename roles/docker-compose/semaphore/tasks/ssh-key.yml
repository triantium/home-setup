- name: Setup semaphore SSH key via password store
  connection: local
  vars:
    ansible_python_interpreter: '/usr/bin/python3'
  run_once: true
  block:
    - name: Check if semaphore SSH private key exists in password store
      ansible.builtin.shell:
        cmd: pass show "{{ semaphore_ssh_key_password_store_location }}"
      register: pass_ssh_key_check
      failed_when: false
      changed_when: false
      no_log: true

    - name: Generate semaphore SSH key pair
      vars:
        ansible_become: no
      when: pass_ssh_key_check.rc != 0
      ansible.builtin.command:
        cmd: >
          ssh-keygen -t ed25519 -a 100
          -C "{{ semaphore_ssh_key_comment }}"
          -f /tmp/semaphore-ssh-key
          -N ""
      args:
        creates: /tmp/semaphore-ssh-key

    - name: Store SSH private key in password store
      vars:
        ansible_become: no
      when: pass_ssh_key_check.rc != 0
      ansible.builtin.shell:
        cmd: pass insert --multiline "{{ semaphore_ssh_key_password_store_location }}" < /tmp/semaphore-ssh-key

    - name: Store SSH public key in password store
      vars:
        ansible_become: no
      when: pass_ssh_key_check.rc != 0
      ansible.builtin.shell:
        cmd: pass insert --multiline "{{ semaphore_ssh_key_public_password_store_location }}" < /tmp/semaphore-ssh-key.pub

    - name: Retrieve SSH private key from password store
      vars:
        ansible_become: no
      ansible.builtin.shell:
        cmd: pass show "{{ semaphore_ssh_key_password_store_location }}" > /tmp/semaphore-ssh-key
      changed_when: false

    - name: Retrieve SSH public key from password store
      vars:
        ansible_become: no
      ansible.builtin.shell:
        cmd: pass show "{{ semaphore_ssh_key_public_password_store_location }}" > /tmp/semaphore-ssh-key.pub
      changed_when: false
      ignore_errors: true

    - name: Push password store git changes
      vars:
        ansible_become: no
      ansible.builtin.shell:
        cmd: pass git push
      changed_when: false
      failed_when: false

- name: Create semaphore SSH key directory on target
  ansible.builtin.file:
    path: "{{ semaphore_ssh_key_dir }}"
    state: directory
    mode: '0755'

- name: Copy SSH private key to target
  ansible.builtin.copy:
    src: /tmp/semaphore-ssh-key
    dest: "{{ semaphore_ssh_private_key_path }}"
    mode: '0400'

- name: Copy SSH public key to target
  ansible.builtin.copy:
    src: /tmp/semaphore-ssh-key.pub
    dest: "{{ semaphore_ssh_private_key_path }}.pub"
    mode: '0444'

- name: Clean up temp SSH key files
  vars:
    ansible_become: no
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/semaphore-ssh-key
    - /tmp/semaphore-ssh-key.pub
