services:
  postgres:
    image: postgres:18.4
    ports:
      - "5432:5432"
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      postgres-net:
      postgres-internal:

  pgadmin:
    image: dpage/pgadmin4:9.15
    container_name: pgadmin4_container
    restart: always
    depends_on:
      - postgres
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin-data:/var/lib/
      - ./pgadmin4/servers.json:/pgadmin4/servers.json
    networks:
      postgres-internal:
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:80/misc/ping -O /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  pgbackups:
    image: prodrigestivill/postgres-backup-local:18-alpine
    restart: always
    volumes:
      - postgres_pgbackups:/backups
    networks:
      postgres-internal:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_CLUSTER=true
      - POSTGRES_DB=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_EXTRA_OPTS=-Z1 --schema=public --blobs
      - BACKUP_ON_START=TRUE
      - SCHEDULE=@daily
      - TZ=Europe/Berlin
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080

  autorestic:
    image: pascaliske/autorestic:latest
    restart: always
    environment:
      - RESTIC_HOST=postgres
    volumes:
      - ./autorestic/config.yml:/etc/autorestic/config.yml
      - ./autorestic/cron:/etc/cron/
      - postgres-data:/backups/postgres-data
      - postgres_pgbackups:/backups/postgres_pgbackups
    entrypoint: ["/bin/sh", "/etc/cron/start_cron.sh"]

volumes:
  postgres-data:
  postgres_pgbackups:
  pgadmin-data:

networks:
  postgres-internal:
  postgres-net:
    external: true
