service_name: postgres
uri: postgres.triantium.de
domain: triantium.ddns.net
postgres_password_location: 'hosts/{{ansible_facts.hostname}}/services/postgres/{{ domain }}'
pgadmin_password_location: 'hosts/{{ansible_facts.hostname}}/services/pgadmin/{{ domain }}'
postgres_password: "{{ lookup('community.general.passwordstore', postgres_password_location, missing='create') }}"
pgadmin_password: "{{ lookup('community.general.passwordstore', pgadmin_password_location , missing='create') }}"
pgadmin_email: "{{ lookup('community.general.passwordstore', pgadmin_password_location ,subkey='email' ,missing='error') }}"

autorestic_location_name: postgres-backups
autorestic_cron_minute: "{{ 60 | random(seed=inventory_hostname + '_' + service_name + '_cron_min') }}"
autorestic_cron_hour: "{{ 24 | random(seed=inventory_hostname + '_' + service_name + '_cron_hour') }}"
autorestic_cron: "{{ autorestic_cron_minute }} {{ autorestic_cron_hour }} * * *"
